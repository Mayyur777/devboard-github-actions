name: ci-flow

on:
  workflow_dispatch:
    
jobs:
  ci-flow:
    runs-on: ubuntu-latest
    steps:
      - name: code Checkout
        uses: actions/checkout@v7

      - name: setup NodeJs
        uses: actions/setup-node@v6
        with:
              node-version: '20'
              cache: npm
              cache-dependency-path: frontend/package-lock.json
      
      - name: install npm Packages
        working-directory: frontend
        run: npm install

      - name: Run linter
        run: npm run lint
        working-directory: frontend
      